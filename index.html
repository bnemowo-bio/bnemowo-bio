<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Nối Từ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0f1117;color:#e8e6ff;min-height:100vh}
h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:2rem;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;font-size:13px;color:#6b7280;margin-bottom:12px}
.container{max-width:520px;margin:0 auto;padding:20px 16px 60px}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:16px;padding:20px;margin-bottom:14px}
.section-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.players-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.player-badge{display:flex;align-items:center;gap:7px;background:#12141f;border:1px solid #2a2d3e;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:500}
.player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-me{background:#a78bfa;box-shadow:0 0 6px #a78bfa88}
.dot-other{background:#60a5fa;box-shadow:0 0 6px #60a5fa88}
.role-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
.role-asker{background:#1e1433;color:#a78bfa;border:1px solid #3d2a72}
.role-guesser{background:#0e1e33;color:#60a5fa;border:1px solid #1a3a6e}
.chain-display{display:flex;flex-wrap:wrap;gap:6px;min-height:44px;align-items:center}
.chain-word{background:#12141f;border:1px solid #2a2d3e;border-radius:20px;padding:5px 13px;font-size:13px;font-weight:500;color:#d1d5db}
.chain-word.latest{border-color:#a78bfa;color:#c4b5fd;background:#1a1433}
.chain-arrow{color:#374151;font-size:14px}
.current-prompt{background:#131a2e;border:1px solid #1e3a5f;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.prompt-label{font-size:11px;color:#60a5fa;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.prompt-word{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:#93c5fd;letter-spacing:1px}
.prompt-hint{font-size:12px;color:#4b5563;margin-top:4px}
.input-row{display:flex;gap:8px}
input[type=text]{flex:1;background:#12141f;border:1.5px solid #2a2d3e;border-radius:10px;padding:10px 14px;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;color:#e8e6ff;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:#a78bfa}
input[type=text]::placeholder{color:#374151}
button{background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-family:'Be Vietnam Pro',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap}
button:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
button:active:not(:disabled){transform:translateY(0)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-approve{background:linear-gradient(135deg,#059669,#10b981);padding:8px 16px;font-size:13px}
.btn-reject{background:linear-gradient(135deg,#dc2626,#ef4444);padding:8px 16px;font-size:13px}
.btn-secondary{background:#1a1d27;border:1px solid #2a2d3e;color:#9ca3af;font-size:13px;padding:8px 14px}
.btn-secondary:hover:not(:disabled){background:#22253a;transform:none}
.status-bar{background:#12141f;border:1px solid #2a2d3e;border-radius:10px;padding:10px 14px;font-size:13px;color:#9ca3af;display:flex;align-items:center;gap:8px;min-height:42px}
.status-bar.pending{border-color:#d97706;color:#fbbf24;background:#1c1600}
.status-bar.error{border-color:#dc2626;color:#f87171;background:#1a0000}
.status-bar.info{border-color:#3b82f6;color:#93c5fd;background:#001228}
.status-bar.success{border-color:#059669;color:#34d399;background:#001a0e}
.spinner{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.approval-box{background:#1c1400;border:1px solid #d97706;border-radius:12px;padding:14px 16px}
.approval-word{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:700;color:#fbbf24;margin-bottom:6px}
.approval-sub{font-size:12px;color:#92400e;margin-bottom:12px}
.approval-actions{display:flex;gap:8px}
.log-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto}
.log-item{font-size:12px;color:#6b7280;padding:3px 0;display:flex;gap:8px;align-items:baseline}
.log-who{font-weight:600;color:#9ca3af;min-width:70px}
.log-word{color:#c4b5fd}
.log-badge{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:600}
.badge-ok{background:#0a2e1a;color:#34d399}
.badge-no{background:#2e0a0a;color:#f87171}
.join-form{display:flex;flex-direction:column;gap:12px}
.empty-chain{color:#374151;font-size:13px;font-style:italic}
.score-row{display:flex;gap:8px;flex-wrap:wrap}
.score-card{background:#12141f;border:1px solid #2a2d3e;border-radius:10px;padding:8px 14px;font-size:12px;text-align:center;flex:1;min-width:80px}
.score-num{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:700;color:#a78bfa;line-height:1;margin-bottom:2px}
.score-lbl{color:#4b5563;font-size:11px}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.cdot.ok{background:#34d399;box-shadow:0 0 5px #34d39966}
.cdot.bad{background:#f87171;box-shadow:0 0 5px #f8717166}
.cdot.mid{background:#fbbf24}
.vote-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.vote-btn{background:#12141f;border:1px solid #2a2d3e;border-radius:8px;padding:5px 12px;font-size:12px;color:#9ca3af;cursor:pointer;transition:all .2s;font-family:'Be Vietnam Pro',sans-serif}
.vote-btn:hover{border-color:#6b7280;color:#e8e6ff}
.vote-btn.voted{border-color:#dc2626;color:#f87171;background:#1a0000}
.vote-btn.reset-voted{border-color:#d97706;color:#fbbf24;background:#1c1600}
.vote-bar{height:4px;background:#1e293b;border-radius:2px;margin-top:6px;overflow:hidden}
.vote-fill{height:100%;border-radius:2px;transition:width .3s}
</style>
</head>
<body>
<div class="container">
  <h1>🔗 Nối Từ</h1>
  <p class="subtitle">Wuyen beo siu mup siu cute :^hihi</p>
  <div style="text-align:center;font-size:12px;color:#4b5563;margin-bottom:14px">
    <span class="cdot mid" id="cdot"></span><span id="ctext">Đang kết nối...</span>
  </div>
  <div id="app"></div>
</div>

<script>
const BACKEND_URL = 'https://noituvoiwuyenmup.baonam04012010.workers.dev/';
const ROOM = (location.hash.replace('#','').trim()||'main').replace(/[^a-z0-9_-]/gi,'').slice(0,20)||'main';

let myId='', myName='';
let state=mkState(), localStatus=null, localTimer=null, pollTimer=null;
let lastRenderedVersion=-1;
const POLL=1300;
function mkState(){ return {players:{},chain:[],pendingWord:'',pendingFrom:'',currentWord:'',askerOrder:[],askerIndex:0,log:[],lastActivity:0,version:0,votes:{}} }
function genId(){ return Math.random().toString(36).slice(2,9) }
function nowStr(){ return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function lc(w){ return (w||'').trim().split(' ').pop()[0]?.toLowerCase()||'' }
function fc(w){ return (w||'').trim()[0]?.toLowerCase()||'' }

function isTyping(){
  const el=document.activeElement;
  return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA');
}

function setConn(ok,msg){
  document.getElementById('cdot').className='cdot '+(ok?'ok':ok===null?'mid':'bad');
  document.getElementById('ctext').textContent=msg||(ok?'Đã kết nối · Phòng: '+ROOM:'Mất kết nối, đang thử lại...');
}

// ── API ──
async function apiGet(){
  const r=await fetch(`${BACKEND_URL}?room=${ROOM}`,{signal:AbortSignal.timeout(6000)});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPut(patch, _retries=0){
  if(_retries > 4) throw new Error('Too many conflicts');
  // Selalu ambil versi terbaru sebelum PUT untuk hindari konflik
  const base = _retries > 0 ? await apiGet() : state;
  const payload={...base,...patch, version:base.version};
  const r=await fetch(`${BACKEND_URL}?room=${ROOM}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:AbortSignal.timeout(6000)});
  if(r.status===409){
    // Conflict: fetch lại và retry với delay nhỏ
    state=await apiGet();
    await new Promise(res=>setTimeout(res, 100 + Math.random()*200));
    return apiPut(patch, _retries+1);
  }
  if(!r.ok) throw new Error(r.status);
  state=await r.json();
  return state;
}

// ── Poll — KHÔNG render khi user đang gõ ──
async function poll(){
  try{
    const newState=await apiGet();
    setConn(true);
    const changed=newState.version!==state.version;
    state=newState;
    if(!myId) return;
    if(!changed) return; // không có gì mới, bỏ qua
    if(isTyping()){
      // Có dữ liệu mới nhưng user đang gõ:
      // Chỉ cập nhật phần không phải input (players, chain, score, log)
      // bằng cách patch từng element riêng thay vì render lại toàn bộ
      patchNonInputAreas();
    } else {
      render();
    }
  } catch(e){ setConn(false); }
}

// Cập nhật các phần không ảnh hưởng đến input đang focus
function patchNonInputAreas(){
  // Chỉ update score nếu có element đó (người dùng đã join)
  const pl=players();
  for(const p of pl){
    const el=document.getElementById('score_'+p.id);
    if(el) el.textContent=(state.players[p.id]?.score)||0;
  }
  // Update connection dot đã được setConn() xử lý rồi
  // Không đụng vào input → focus được giữ nguyên
}

function startPoll(){ if(pollTimer) clearInterval(pollTimer); poll(); pollTimer=setInterval(poll,POLL); }

// ── Helpers ──
function players(){
  const ord=state.askerOrder||[], ps=state.players||{}, res=[];
  for(const id of ord) if(ps[id]) res.push({id,...ps[id]});
  for(const id of Object.keys(ps)) if(!res.find(p=>p.id===id)) res.push({id,...ps[id]});
  return res;
}
function asker(){ const l=players(); return l[(state.askerIndex||0)%Math.max(1,l.length)]||null }
function guesser(){ const l=players(); return l.length<2?null:l[((state.askerIndex||0)+1)%l.length] }

// ── Actions ──
async function joinGame(name){
  myId=genId(); myName=name;
  const ps={...(state.players||{})}; ps[myId]={name,score:0,joinedAt:Date.now()};
  const ord=[...(state.askerOrder||[])]; if(!ord.includes(myId)) ord.push(myId);
  try{ await apiPut({players:ps,askerOrder:ord}); render(); startPoll(); }
  catch(e){ setLocalStatus('❌ Không kết nối được backend.','error'); }
}

async function leaveGame(){
  if(!myId) return;
  const ps={...(state.players||{})}; delete ps[myId];
  const ord=(state.askerOrder||[]).filter(id=>id!==myId);
  let idx=state.askerIndex||0; if(idx>=ord.length&&ord.length>0) idx=0;
  try{ await apiPut({players:ps,askerOrder:ord,askerIndex:idx,currentWord:'',pendingWord:'',pendingFrom:''}) } catch{}
  myId=''; myName=''; clearInterval(pollTimer);
  document.getElementById('app').innerHTML=joinHtml();
}

async function resetGame(){
  if(!confirm('Reset? Điểm về 0.')) return;
  const ps={};
  for(const id of Object.keys(state.players||{})) ps[id]={...state.players[id],score:0};
  await doAction({players:ps,chain:[],pendingWord:'',pendingFrom:'',currentWord:'',askerIndex:0,log:[],votes:{}});
}

async function voteKick(targetId){
  if(!myId||targetId===myId) return;

  // kick luôn, không cần vote
  const ps={...(state.players||{})}; delete ps[targetId];
  const ord=(state.askerOrder||[]).filter(id=>id!==targetId);
  let idx=state.askerIndex||0; if(idx>=ord.length&&ord.length>0) idx=0;

  const votes={...(state.votes||{})};
  delete votes['kick_'+targetId];

  await doAction({
    players:ps,
    askerOrder:ord,
    askerIndex:idx,
    currentWord:'',
    pendingWord:'',
    pendingFrom:'',
    votes
  });

  setLocalStatus('🚫 Đã kick','success');
}

async function voteReset(){
  if(!myId) return;

  // reset luôn
  const ps={};
  for(const id of Object.keys(state.players||{})){
    ps[id]={...state.players[id],score:0};
  }

  await doAction({
    players:ps,
    chain:[],
    pendingWord:'',
    pendingFrom:'',
    currentWord:'',
    askerIndex:0,
    log:[],
    votes:{}
  });

  setLocalStatus('🔄 Đã reset game','success');
}

async function submitWord(word){
  const a=asker(); if(!a||a.id!==myId) return;
  const chain=state.chain||[];
  if(chain.length){ const n=lc(chain[chain.length-1]); if(fc(word)!==n){ setLocalStatus(`⚠ Phải bắt đầu bằng "${n.toUpperCase()}"!`,'error'); return; } }
  if(chain.includes(word)){ setLocalStatus('⚠ Từ đã dùng rồi!','error'); return; }
  await doAction({currentWord:word.trim().toLowerCase()});
}

async function submitAnswer(word){
  const g=guesser(); if(!g||g.id!==myId) return;
  if(!state.currentWord) return;
  const n=lc(state.currentWord);
  if(fc(word)!==n){ setLocalStatus(`⚠ Phải bắt đầu bằng "${n.toUpperCase()}"!`,'error'); return; }
  if((state.chain||[]).includes(word)){ setLocalStatus('⚠ Từ đã dùng rồi!','error'); return; }
  await doAction({pendingWord:word.trim().toLowerCase(),pendingFrom:myId});
}

async function approveWord(ok){
  const a=asker(); if(!a||a.id!==myId) return;
  const word=state.pendingWord; if(!word) return;
  const g=guesser();
  const ps={...(state.players||{})};
  let chain=[...(state.chain||[])], log=[...(state.log||[])], idx=state.askerIndex||0;
  if(ok){
    chain.push(state.currentWord,word);
    if(g&&ps[g.id]) ps[g.id].score=(ps[g.id].score||0)+1;
    log.unshift({word,by:g?g.name:'?',ok:true,time:nowStr()});
    idx=(idx+1)%Math.max(1,(state.askerOrder||[]).length);
  } else {
    log.unshift({word,by:g?g.name:'?',ok:false,time:nowStr()});
  }
  if(log.length>30) log=log.slice(0,30);
  await doAction({chain,log,players:ps,askerIndex:idx,currentWord:'',pendingWord:'',pendingFrom:''});
}

async function doAction(patch){
  try{
    await apiPut(patch);
    render(); // sau action của mình thì luôn render full
  }
  catch(e){ setLocalStatus('❌ Lỗi kết nối','error'); }
}

function setLocalStatus(msg,type){
  localStatus={msg,type}; clearTimeout(localTimer);
  localTimer=setTimeout(()=>{localStatus=null;renderStatusOnly()},3500);
  renderStatusOnly();
}

// Chỉ update thanh status, không đụng input
function renderStatusOnly(){
  const el=document.getElementById('localStatusBar');
  if(!el) return;
  if(localStatus){
    el.innerHTML=`<div class="status-bar ${localStatus.type}" style="margin-top:10px">${localStatus.msg}</div>`;
  } else {
    el.innerHTML='';
  }
}

// ── Render ──
function render(){
  if(!myId){ document.getElementById('app').innerHTML=joinHtml(); return; }
  const pl=players(), a=asker(), g=guesser();
  const isA=a&&a.id===myId, isG=g&&g.id===myId;
  const wait=pl.length<2, chain=state.chain||[];
  let h='';

  // Players
  h+=`<div class="card"><div class="section-label">Người chơi (${pl.length})</div><div class="players-row">`;
  for(const p of pl){
    const me=p.id===myId, ak=a&&a.id===p.id;
    h+=`<div class="player-badge"><div class="player-dot ${me?'dot-me':'dot-other'}"></div><span>${esc(p.name)}${me?' (bạn)':''}</span><span class="role-tag ${ak?'role-asker':'role-guesser'}">${ak?'🎯 Hỏi':'✏️ Đáp'}</span></div>`;
  }
  if(wait) h+=`<span style="font-size:12px;color:#4b5563;font-style:italic">Chờ bạn bè vào...</span>`;
  h+=`</div>`;
  // Vote kick buttons — hiển thị cho người chơi khác
  if(!wait){
    const votes=state.votes||{};
    const needed=Math.ceil(pl.length/2);
    h+=`<div class="vote-row">`;
    for(const p of pl){
      if(p.id===myId) continue;
      const key='kick_'+p.id;
      const cnt=(votes[key]||[]).length;
      const iVoted=(votes[key]||[]).includes(myId);
      h+=`<button class="vote-btn ${iVoted?'voted':''}" onclick="voteKick('${p.id}')">`;
      h+=`${iVoted?'↩ Bỏ vote kick':'🚫 Kick'} ${esc(p.name)}`;
      if(cnt>0) h+=` (${cnt}/${needed})`;
      h+=`</button>`;
    }
    // Vote reset
    const rKey='reset', rCnt=(votes[rKey]||[]).length, iVotedR=(votes[rKey]||[]).includes(myId);
    h+=`<button class="vote-btn ${iVotedR?'reset-voted':''}" onclick="voteReset()">`;
    h+=`${iVotedR?'↩ Bỏ vote':'🔄 Vote reset'} phòng`;
    if(rCnt>0) h+=` (${rCnt}/${needed})`;
    h+=`</button>`;
    h+=`</div>`;
    if(rCnt>0||pl.some(p=>p.id!==myId&&(votes['kick_'+p.id]||[]).length>0)){
      h+=`<div class="vote-bar"><div class="vote-fill" style="width:${Math.round(Math.max(...pl.filter(p=>p.id!==myId).map(p=>(votes['kick_'+p.id]||[]).length), rCnt, 0)/needed*100)}%;background:#a78bfa"></div></div>`;
    }
  }
  if(wait) h+=`<div style="margin-top:12px;background:#12141f;border:1px dashed #2a2d3e;border-radius:10px;padding:10px 14px;font-size:12px;color:#6b7280">📎 Gửi link này cho bạn: <b style="color:#a78bfa;word-break:break-all">${esc(location.href)}</b></div>`;
  h+=`</div>`;

  if(!wait){
    // Chain
    h+=`<div class="card"><div class="section-label">Chuỗi từ (${chain.length})</div>`;
    if(!chain.length){ h+=`<div class="chain-display"><span class="empty-chain">Chưa có từ nào...</span></div>`; }
    else {
      h+=`<div class="chain-display">`;
      const st=Math.max(0,chain.length-10);
      if(st>0) h+=`<span style="color:#374151;font-size:12px">...${st} từ trước</span><span class="chain-arrow">→</span>`;
      for(let i=st;i<chain.length;i++){
        if(i>st) h+=`<span class="chain-arrow">→</span>`;
        h+=`<span class="chain-word ${i===chain.length-1?'latest':''}">${esc(chain[i])}</span>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;

    // Action card — input nằm ở đây, được bảo vệ khỏi poll
    h+=`<div class="card" id="actionCard">`;
    if(!state.currentWord&&isA){
      const nc=chain.length?lc(chain[chain.length-1]).toUpperCase():'';
      h+=`<div class="section-label">Lượt của bạn — Đưa từ để thách</div>`;
      h+=`<div class="input-row"><input type="text" id="wordInput" placeholder="${nc?'Từ bắt đầu bằng '+nc+'...':'Nhập từ đầu tiên...'}" autocomplete="off"/><button onclick="handleWord()">Đưa từ →</button></div>`;
      if(nc) h+=`<div style="font-size:12px;color:#4b5563;margin-top:8px">Từ cuối kết thúc bằng "<b style="color:#a78bfa">${nc}</b>", từ bạn đưa phải bắt đầu bằng chữ đó</div>`;
    } else if(!state.currentWord&&!isA){
      h+=`<div class="status-bar info"><span>⏳ Chờ ${a?esc(a.name):'...'} đưa từ...</span></div>`;
    } else if(state.currentWord&&!state.pendingWord){
      if(isG){
        h+=`<div class="current-prompt"><div class="prompt-label">Từ cần nối</div><div class="prompt-word">${esc(state.currentWord.toUpperCase())}</div><div class="prompt-hint">Nối bằng từ bắt đầu bằng "<b>${lc(state.currentWord).toUpperCase()}</b>"</div></div>`;
        h+=`<div class="input-row"><input type="text" id="ansInput" placeholder="Từ bắt đầu bằng ${lc(state.currentWord).toUpperCase()}..." autocomplete="off"/><button onclick="handleAns()">Gửi →</button></div>`;
      } else if(isA){
        h+=`<div class="current-prompt"><div class="prompt-label">Bạn đã đưa từ</div><div class="prompt-word">${esc(state.currentWord.toUpperCase())}</div><div class="prompt-hint">Chờ ${g?esc(g.name):'...'} trả lời...</div></div>`;
        h+=`<div class="status-bar"><div class="spinner"></div><span>Đang chờ trả lời...</span></div>`;
      }
    } else if(state.pendingWord){
      if(isA){
        h+=`<div class="approval-box"><div style="font-size:12px;color:#92400e;margin-bottom:4px">Câu trả lời từ ${g?esc(g.name):'...'}</div><div class="approval-word">${esc(state.currentWord.toUpperCase())} → ${esc(state.pendingWord.toUpperCase())}</div><div class="approval-sub">Từ "<b>${esc(state.pendingWord)}</b>" có hợp lệ không?</div><div class="approval-actions"><button class="btn-approve" onclick="approveWord(true)">✓ Đồng ý</button><button class="btn-reject" onclick="approveWord(false)">✗ Không hợp lệ</button></div></div>`;
      } else {
        h+=`<div class="status-bar pending"><div class="spinner"></div><span>Chờ ${a?esc(a.name):'...'} duyệt từ "<b>${esc(state.pendingWord)}</b>"...</span></div>`;
      }
    }
    // Vùng status riêng — update độc lập, không đụng input
    h+=`<div id="localStatusBar">${localStatus?`<div class="status-bar ${localStatus.type}" style="margin-top:10px">${localStatus.msg}</div>`:''}</div>`;
    h+=`</div>`;

    // Score — mỗi số có id riêng để patch không cần render lại
    h+=`<div class="card"><div class="section-label">Điểm số</div><div class="score-row">`;
    for(const p of pl) h+=`<div class="score-card"><div class="score-num" id="score_${p.id}">${(state.players[p.id]?.score)||0}</div><div class="score-lbl">${esc(p.name)}</div></div>`;
    h+=`</div></div>`;

    // Log
    const log=state.log||[];
    if(log.length){
      h+=`<div class="card"><div class="section-label">Lịch sử</div><div class="log-list">`;
      for(const l of log) h+=`<div class="log-item"><span class="log-who">${esc(l.by)}</span><span class="log-word">${esc(l.word)}</span><span class="log-badge ${l.ok?'badge-ok':'badge-no'}">${l.ok?'✓':'✗'}</span><span style="color:#374151;font-size:11px">${l.time}</span></div>`;
      h+=`</div></div>`;
    }
  }

  h+=`<div style="text-align:center;margin-top:16px;display:flex;gap:8px;justify-content:center"><button class="btn-secondary" onclick="leaveGame()">🚪 Rời game</button></div>`;
  document.getElementById('app').innerHTML=h;
}

function joinHtml(){
  return `<div class="card"><div class="section-label">Nhập tên của bạn</div><div class="join-form"><input type="text" id="nameInput" placeholder="Tên hiển thị..." maxlength="20" autocomplete="off"/><button onclick="handleJoin()">Vào chơi →</button></div><div style="text-align:center;font-size:13px;color:#4b5563;margin-top:14px">Wuyen beo siu mup siu cute :^hihi</div></div>`;
}

function handleJoin(){ const n=document.getElementById('nameInput')?.value.trim(); if(n) joinGame(n); }
function handleWord(){ const w=document.getElementById('wordInput')?.value.trim().toLowerCase(); if(w) submitWord(w); }
function handleAns(){ const w=document.getElementById('ansInput')?.value.trim().toLowerCase(); if(w) submitAnswer(w); }

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const n=document.getElementById('nameInput'), w=document.getElementById('wordInput'), a=document.getElementById('ansInput');
  if(document.activeElement===n) handleJoin();
  else if(document.activeElement===w) handleWord();
  else if(document.activeElement===a) handleAns();
});


document.getElementById('app').innerHTML=joinHtml();
startPoll();
</script>
</body>
</html>

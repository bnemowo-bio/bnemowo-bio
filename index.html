<!-- Gun.js - P2P realtime database, không cần server, miễn phí -->
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script>
// ════════════════════════════════════════════
//  GUN.JS REALTIME P2P DATABASE
//  Sync qua các relay server công khai của Gun
// ════════════════════════════════════════════

const ROOM = 'noitu_room_' + (location.hash.replace('#','') || 'main');

const gun = Gun([
  'https://gun-manhattan.herokuapp.com/gun',
  'https://gunjs.herokuapp.com/gun',
]);

const roomRef = gun.get(ROOM);

let myId = '';
let myName = '';
let localStatus = null;
let localStatusTimer = null;
let state = defaultState();
let initialized = false;

function genId() { return Math.random().toString(36).slice(2, 8); }
function nowStr() {
  return new Date().toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function defaultState() {
  return {
    players: {},
    chain: [],
    pendingWord: '',
    pendingFrom: '',
    log: [],
    lastActivity: Date.now(),
    currentWord: '',
    askerOrder: [],
    askerIndex: 0
  };
}

// ── Lấy danh sách người chơi theo thứ tự ──
function getPlayerList(st) {
  const order = st.askerOrder || [];
  const players = st.players || {};
  const result = [];
  for (const id of order) {
    if (players[id]) result.push({ id, ...players[id] });
  }
  // thêm người chưa có trong order
  for (const id of Object.keys(players)) {
    if (!result.find(p => p.id === id)) result.push({ id, ...players[id] });
  }
  return result;
}

function getAsker(st) {
  const list = getPlayerList(st);
  if (!list.length) return null;
  return list[(st.askerIndex || 0) % list.length];
}

function getGuesser(st) {
  const list = getPlayerList(st);
  if (list.length < 2) return null;
  return list[((st.askerIndex || 0) + 1) % list.length];
}

function getLastChar(word) {
  if (!word) return '';
  return word.trim().split(' ').pop().charAt(0).toLowerCase();
}
function getFirstChar(word) {
  if (!word) return '';
  return word.trim().charAt(0).toLowerCase();
}

// ── Đọc state từ Gun ──
function listenState() {
  // Đọc players
  roomRef.get('meta').on(data => {
    if (!data) return;
    try {
      const parsed = JSON.parse(data);
      state.chain = parsed.chain || [];
      state.pendingWord = parsed.pendingWord || '';
      state.pendingFrom = parsed.pendingFrom || '';
      state.currentWord = parsed.currentWord || '';
      state.askerIndex = parsed.askerIndex || 0;
      state.askerOrder = parsed.askerOrder || [];
      state.log = parsed.log || [];
      initialized = true;
      if (myId) render();
    } catch(e) {}
  });

  roomRef.get('players').map().on((data, key) => {
    if (data === null) {
      delete state.players[key];
    } else {
      try {
        state.players[key] = typeof data === 'string' ? JSON.parse(data) : data;
      } catch(e) {
        state.players[key] = data;
      }
    }
    if (myId) render();
  });
}

function saveMeta() {
  const meta = {
    chain: state.chain,
    pendingWord: state.pendingWord,
    pendingFrom: state.pendingFrom,
    currentWord: state.currentWord,
    askerIndex: state.askerIndex,
    askerOrder: state.askerOrder,
    log: state.log,
    lastActivity: Date.now()
  };
  roomRef.get('meta').put(JSON.stringify(meta));
}

function savePlayer(id, data) {
  roomRef.get('players').get(id).put(JSON.stringify(data));
}

// ── Tham gia game ──
async function joinGame(name) {
  myId = genId();
  myName = name;

  const playerData = { name, score: 0, joinedAt: Date.now() };
  state.players[myId] = playerData;

  if (!state.askerOrder.includes(myId)) {
    state.askerOrder.push(myId);
  }

  savePlayer(myId, playerData);
  saveMeta();

  // Cleanup khi đóng tab
  window.addEventListener('beforeunload', leaveGame);

  render();
}

function leaveGame() {
  if (!myId) return;
  state.askerOrder = state.askerOrder.filter(id => id !== myId);
  delete state.players[myId];
  if (state.askerIndex >= state.askerOrder.length && state.askerOrder.length > 0) {
    state.askerIndex = 0;
  }
  roomRef.get('players').get(myId).put(null);
  saveMeta();
  myId = '';
  myName = '';
  document.getElementById('app').innerHTML = renderJoinHtml();
}

function resetGame() {
  const players = { ...state.players };
  const order = [...state.askerOrder];
  for (const id of Object.keys(players)) {
    players[id] = { ...players[id], score: 0 };
  }
  state.chain = [];
  state.pendingWord = '';
  state.pendingFrom = '';
  state.currentWord = '';
  state.askerIndex = 0;
  state.log = [];
  state.players = players;
  state.askerOrder = order;

  for (const id of Object.keys(players)) {
    savePlayer(id, players[id]);
  }
  saveMeta();
}

function submitWord(word) {
  const asker = getAsker(state);
  if (!asker || asker.id !== myId) return;

  if (state.chain.length > 0) {
    const last = state.chain[state.chain.length - 1];
    const needed = getLastChar(last);
    const given = getFirstChar(word);
    if (needed !== given) {
      setLocalStatus(`⚠ Từ phải bắt đầu bằng chữ "${needed.toUpperCase()}"!`, 'error');
      return;
    }
  }

  if (state.chain.includes(word.toLowerCase())) {
    setLocalStatus('⚠ Từ này đã được dùng rồi!', 'error');
    return;
  }

  state.currentWord = word.trim().toLowerCase();
  saveMeta();
}

function submitAnswer(word) {
  const guesser = getGuesser(state);
  if (!guesser || guesser.id !== myId) return;
  if (!state.currentWord) return;

  const needed = getLastChar(state.currentWord);
  const given = getFirstChar(word);
  if (needed !== given) {
    setLocalStatus(`⚠ Từ phải bắt đầu bằng chữ "${needed.toUpperCase()}"!`, 'error');
    return;
  }

  if (state.chain.includes(word.toLowerCase())) {
    setLocalStatus('⚠ Từ này đã được dùng rồi!', 'error');
    return;
  }

  state.pendingWord = word.trim().toLowerCase();
  state.pendingFrom = myId;
  saveMeta();
}

function approveWord(approved) {
  const asker = getAsker(state);
  if (!asker || asker.id !== myId) return;

  const word = state.pendingWord;
  if (!word) return;

  const guesser = getGuesser(state);

  if (approved) {
    state.chain.push(state.currentWord);
    state.chain.push(word);
    if (guesser && state.players[guesser.id]) {
      state.players[guesser.id].score = (state.players[guesser.id].score || 0) + 1;
      savePlayer(guesser.id, state.players[guesser.id]);
    }
    state.log.unshift({ word, by: guesser ? guesser.name : '?', ok: true, time: nowStr() });
    state.askerIndex = (state.askerIndex + 1) % Math.max(1, state.askerOrder.length);
    state.currentWord = '';
    state.pendingWord = '';
    state.pendingFrom = '';
  } else {
    state.log.unshift({ word, by: guesser ? guesser.name : '?', ok: false, time: nowStr() });
    state.pendingWord = '';
    state.pendingFrom = '';
  }

  if (state.log.length > 30) state.log = state.log.slice(0, 30);
  saveMeta();
}

function setLocalStatus(msg, type) {
  localStatus = { msg, type };
  clearTimeout(localStatusTimer);
  localStatusTimer = setTimeout(() => { localStatus = null; render(); }, 3000);
  render();
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');
  if (!myId) { app.innerHTML = renderJoinHtml(); return; }

  const playerList = getPlayerList(state);
  const asker = getAsker(state);
  const guesser = getGuesser(state);
  const isAsker = asker && asker.id === myId;
  const isGuesser = guesser && guesser.id === myId;
  const waitingForPartner = playerList.length < 2;

  let html = '';

  // ── Players card ──
  html += `<div class="card">`;
  html += `<div class="section-label">Người chơi (${playerList.length})</div>`;
  html += `<div class="players-row">`;
  for (const p of playerList) {
    const isMe = p.id === myId;
    const isAskerP = asker && asker.id === p.id;
    html += `<div class="player-badge">
      <div class="player-dot ${isMe ? 'dot-me' : 'dot-other'}"></div>
      <span>${esc(p.name)}${isMe ? ' (bạn)' : ''}</span>
      <span class="role-tag ${isAskerP ? 'role-asker' : 'role-guesser'}">${isAskerP ? '🎯 Hỏi' : '✏️ Đáp'}</span>
    </div>`;
  }
  if (waitingForPartner) {
    html += `<span style="font-size:12px;color:#4b5563;font-style:italic">Chờ bạn bè tham gia...</span>`;
  }
  html += `</div>`;
  if (waitingForPartner) {
    html += `<div style="margin-top:12px;background:#12141f;border:1px dashed #2a2d3e;border-radius:10px;padding:10px 14px;font-size:12px;color:#4b5563">
      💡 Gửi link trang này cho bạn bè để cùng vào: <code style="color:#a78bfa;font-size:11px">${esc(location.href)}</code>
    </div>`;
  }
  html += `</div>`;

  if (!waitingForPartner) {
    // ── Chain card ──
    html += `<div class="card">`;
    html += `<div class="section-label">Chuỗi từ (${state.chain.length} từ)</div>`;
    if (state.chain.length === 0) {
      html += `<div class="chain-display"><span class="empty-chain">Chưa có từ nào...</span></div>`;
    } else {
      html += `<div class="chain-display">`;
      const start = Math.max(0, state.chain.length - 10);
      if (start > 0) html += `<span style="color:#374151;font-size:12px">...${start} từ trước</span><span class="chain-arrow">→</span>`;
      for (let i = start; i < state.chain.length; i++) {
        if (i > start) html += `<span class="chain-arrow">→</span>`;
        html += `<span class="chain-word ${i === state.chain.length-1 ? 'latest' : ''}">${esc(state.chain[i])}</span>`;
      }
      html += `</div>`;
    }
    html += `</div>`;

    // ── Action card ──
    html += `<div class="card">`;

    if (!state.currentWord && isAsker) {
      const lastWord = state.chain.length > 0 ? state.chain[state.chain.length - 1] : '';
      const needChar = lastWord ? getLastChar(lastWord).toUpperCase() : '';
      html += `<div class="section-label">Lượt của bạn — Đưa từ để thách</div>`;
      html += `<div class="input-row">
        <input type="text" id="wordInput" placeholder="${needChar ? 'Từ bắt đầu bằng ' + needChar + '...' : 'Nhập từ đầu tiên...'}" autocomplete="off" />
        <button onclick="handleSubmitWord()">Đưa từ →</button>
      </div>`;
      if (needChar) {
        html += `<div style="font-size:12px;color:#4b5563;margin-top:8px">Từ cuối kết thúc bằng "<b style="color:#a78bfa">${needChar}</b>", bạn cũng phải bắt đầu bằng chữ đó</div>`;
      }
    } else if (!state.currentWord && !isAsker) {
      html += `<div class="status-bar info"><span>⏳ Đang chờ ${asker ? esc(asker.name) : '...'} đưa ra từ...</span></div>`;
    } else if (state.currentWord && !state.pendingWord) {
      if (isGuesser) {
        html += `<div class="current-prompt">
          <div class="prompt-label">Từ cần nối</div>
          <div class="prompt-word">${esc(state.currentWord.toUpperCase())}</div>
          <div class="prompt-hint">Hãy nối bằng từ bắt đầu bằng "<b>${getLastChar(state.currentWord).toUpperCase()}</b>"</div>
        </div>`;
        html += `<div class="input-row">
          <input type="text" id="ansInput" placeholder="Từ bắt đầu bằng ${getLastChar(state.currentWord).toUpperCase()}..." autocomplete="off" />
          <button onclick="handleSubmitAnswer()">Gửi →</button>
        </div>`;
      } else if (isAsker) {
        html += `<div class="current-prompt">
          <div class="prompt-label">Bạn đã đưa từ</div>
          <div class="prompt-word">${esc(state.currentWord.toUpperCase())}</div>
          <div class="prompt-hint">Chờ ${guesser ? esc(guesser.name) : '...'} trả lời...</div>
        </div>`;
        html += `<div class="status-bar"><div class="spinner"></div><span>Đang chờ trả lời...</span></div>`;
      }
    } else if (state.pendingWord) {
      if (isAsker) {
        html += `<div class="approval-box">
          <div style="font-size:12px;color:#92400e;margin-bottom:4px">Câu trả lời của ${guesser ? esc(guesser.name) : '...'}</div>
          <div class="approval-word">${esc(state.currentWord.toUpperCase())} → ${esc(state.pendingWord.toUpperCase())}</div>
          <div class="approval-sub">Bạn có đồng ý từ "<b>${esc(state.pendingWord)}</b>" là hợp lệ không?</div>
          <div class="approval-actions">
            <button class="btn-approve" onclick="handleApprove(true)">✓ Đồng ý</button>
            <button class="btn-reject" onclick="handleApprove(false)">✗ Không hợp lệ</button>
          </div>
        </div>`;
      } else {
        html += `<div class="status-bar pending"><div class="spinner"></div><span>Chờ ${asker ? esc(asker.name) : '...'} duyệt từ "<b>${esc(state.pendingWord)}</b>"...</span></div>`;
      }
    }

    if (localStatus) {
      html += `<div class="status-bar ${localStatus.type}" style="margin-top:10px">${localStatus.msg}</div>`;
    }
    html += `</div>`;

    // ── Score card ──
    html += `<div class="card"><div class="section-label">Điểm số</div><div class="score-row">`;
    for (const p of playerList) {
      html += `<div class="score-card">
        <div class="score-num">${(state.players[p.id] && state.players[p.id].score) || 0}</div>
        <div class="score-lbl">${esc(p.name)}</div>
      </div>`;
    }
    html += `</div></div>`;

    // ── Log card ──
    if (state.log && state.log.length > 0) {
      html += `<div class="card"><div class="section-label">Lịch sử</div><div class="log-list">`;
      for (const l of state.log) {
        html += `<div class="log-item">
          <span class="log-who">${esc(l.by)}</span>
          <span class="log-word">${esc(l.word)}</span>
          <span class="log-badge ${l.ok ? 'badge-ok' : 'badge-no'}">${l.ok ? '✓' : '✗'}</span>
          <span style="color:#374151;font-size:11px">${l.time}</span>
        </div>`;
      }
      html += `</div></div>`;
    }
  }

  html += `<div style="text-align:center;margin-top:16px;display:flex;gap:8px;justify-content:center">
    <button class="btn-secondary" onclick="handleReset()">🔄 Chơi lại</button>
    <button class="btn-secondary" onclick="handleLeave()">🚪 Rời game</button>
  </div>`;

  app.innerHTML = html;
}

function renderJoinHtml() {
  return `<div class="card">
    <div class="section-label">Nhập tên của bạn</div>
    <div class="join-form">
      <input type="text" id="nameInput" placeholder="Tên hiển thị của bạn..." maxlength="20" autocomplete="off" />
      <button onclick="handleJoin()">Vào chơi →</button>
    </div>
    <div class="notice" style="margin-top:14px">Wuyen siu mup siu cute :^hihi</div>
  </div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Handlers ──
function handleJoin() {
  const name = document.getElementById('nameInput')?.value.trim();
  if (!name) return;
  joinGame(name);
}
function handleSubmitWord() {
  const word = document.getElementById('wordInput')?.value.trim().toLowerCase();
  if (!word) return;
  submitWord(word);
}
function handleSubmitAnswer() {
  const word = document.getElementById('ansInput')?.value.trim().toLowerCase();
  if (!word) return;
  submitAnswer(word);
}
function handleApprove(yes) { approveWord(yes); }
function handleReset() { if (confirm('Reset game? Điểm số sẽ về 0.')) resetGame(); }
function handleLeave() { leaveGame(); }

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const nameInput = document.getElementById('nameInput');
  const wordInput = document.getElementById('wordInput');
  const ansInput = document.getElementById('ansInput');
  if (nameInput) handleJoin();
  else if (wordInput) handleSubmitWord();
  else if (ansInput) handleSubmitAnswer();
});

// ── Khởi động ──
document.getElementById('app').innerHTML = renderJoinHtml();
listenState();
</script>
</body>
</html>

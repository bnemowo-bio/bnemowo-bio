<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Nối Từ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0f1117;color:#e8e6ff;min-height:100vh}
h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:2rem;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.subtitle{text-align:center;font-size:13px;color:#6b7280;margin-bottom:12px}
.container{max-width:520px;margin:0 auto;padding:20px 16px 60px}
.card{background:#1a1d27;border:1px solid #2a2d3e;border-radius:16px;padding:20px;margin-bottom:14px}
.section-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#6b7280;margin-bottom:10px}
.players-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.player-badge{display:flex;align-items:center;gap:7px;background:#12141f;border:1px solid #2a2d3e;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:500}
.player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#60a5fa;box-shadow:0 0 6px #60a5fa88}
.dot-me{background:#a78bfa !important;box-shadow:0 0 6px #a78bfa88 !important}
.ready-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;background:#0a2e1a;color:#34d399;border:1px solid #0f4a28}
.waiting-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;background:#1c1400;color:#fbbf24;border:1px solid #3a2800}
.chain-display{display:flex;flex-wrap:wrap;gap:6px;min-height:44px;align-items:center}
.chain-word{background:#12141f;border:1px solid #2a2d3e;border-radius:20px;padding:5px 13px;font-size:13px;font-weight:500;color:#d1d5db}
.chain-word.latest{border-color:#a78bfa;color:#c4b5fd;background:#1a1433}
.chain-word.start{border-color:#34d399;color:#6ee7b7;background:#001a0e}
.chain-arrow{color:#374151;font-size:14px}
.current-prompt{background:#131a2e;border:1px solid #1e3a5f;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.prompt-label{font-size:11px;color:#60a5fa;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.prompt-word{font-family:'Baloo 2',cursive;font-size:2rem;font-weight:800;color:#93c5fd;letter-spacing:1px}
.prompt-connect{font-size:13px;color:#a78bfa;margin-top:6px;font-weight:600}
.prompt-hint{font-size:12px;color:#4b5563;margin-top:4px}
.input-row{display:flex;gap:8px}
input[type=text]{flex:1;background:#12141f;border:1.5px solid #2a2d3e;border-radius:10px;padding:10px 14px;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;color:#e8e6ff;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:#a78bfa}
input[type=text]::placeholder{color:#374151}
button{background:linear-gradient(135deg,#7c3aed,#3b82f6);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-family:'Be Vietnam Pro',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;white-space:nowrap}
button:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
button:active:not(:disabled){transform:translateY(0)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-approve{background:linear-gradient(135deg,#059669,#10b981);padding:8px 16px;font-size:13px}
.btn-reject{background:linear-gradient(135deg,#dc2626,#ef4444);padding:8px 16px;font-size:13px}
.btn-surrender{background:#1a1d27;border:1px solid #d97706;color:#fbbf24;padding:8px 16px;font-size:13px}
.btn-surrender:hover:not(:disabled){background:#1c1400;transform:none}
.btn-ready{background:linear-gradient(135deg,#059669,#10b981);width:100%;padding:12px;font-size:15px}
.btn-unready{background:linear-gradient(135deg,#dc2626,#ef4444);width:100%;padding:12px;font-size:15px}
.btn-secondary{background:#1a1d27;border:1px solid #2a2d3e;color:#9ca3af;font-size:13px;padding:8px 14px}
.btn-secondary:hover:not(:disabled){background:#22253a;transform:none}
.status-bar{background:#12141f;border:1px solid #2a2d3e;border-radius:10px;padding:10px 14px;font-size:13px;color:#9ca3af;display:flex;align-items:center;gap:8px;min-height:42px}
.status-bar.pending{border-color:#d97706;color:#fbbf24;background:#1c1600}
.status-bar.error{border-color:#dc2626;color:#f87171;background:#1a0000}
.status-bar.info{border-color:#3b82f6;color:#93c5fd;background:#001228}
.status-bar.success{border-color:#059669;color:#34d399;background:#001a0e}
.spinner{width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.approval-box{background:#1c1400;border:1px solid #d97706;border-radius:12px;padding:14px 16px}
.approval-word{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:700;color:#fbbf24;margin-bottom:6px}
.approval-sub{font-size:12px;color:#92400e;margin-bottom:12px}
.approval-actions{display:flex;gap:8px;flex-wrap:wrap}
.log-list{display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto}
.log-item{font-size:12px;color:#6b7280;padding:3px 0;display:flex;gap:8px;align-items:baseline}
.log-who{font-weight:600;color:#9ca3af;min-width:60px}
.log-word{color:#c4b5fd}
.log-badge{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:600}
.badge-ok{background:#0a2e1a;color:#34d399}
.badge-no{background:#2e0a0a;color:#f87171}
.badge-sur{background:#1c1400;color:#fbbf24}
.join-form{display:flex;flex-direction:column;gap:12px}
.score-row{display:flex;gap:8px;flex-wrap:wrap}
.score-card{background:#12141f;border:1px solid #2a2d3e;border-radius:10px;padding:8px 14px;font-size:12px;text-align:center;flex:1;min-width:80px}
.score-num{font-family:'Baloo 2',cursive;font-size:1.5rem;font-weight:700;color:#a78bfa;line-height:1;margin-bottom:2px}
.score-lbl{color:#4b5563;font-size:11px}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.cdot.ok{background:#34d399;box-shadow:0 0 5px #34d39966}
.cdot.bad{background:#f87171}
.cdot.mid{background:#fbbf24}
.vote-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.vote-btn{background:#12141f;border:1px solid #2a2d3e;border-radius:8px;padding:5px 12px;font-size:12px;color:#9ca3af;cursor:pointer;transition:all .2s;font-family:'Be Vietnam Pro',sans-serif}
.vote-btn:hover{border-color:#6b7280;color:#e8e6ff}
.vote-btn.voted{border-color:#dc2626;color:#f87171;background:#1a0000}
.vote-btn.reset-voted{border-color:#d97706;color:#fbbf24;background:#1c1600}
.chip{display:inline-block;background:#1a1433;border:1.5px solid #a78bfa;border-radius:8px;padding:2px 10px;font-weight:700;color:#c4b5fd;font-size:14px}
.rules-box{font-size:13px;color:#6b7280;line-height:1.9}
.rules-box .eg{color:#9ca3af}
</style>
</head>
<body>
<div class="container">
  <h1>🔗 Nối Từ</h1>
  <p class="subtitle">Wuyen siu mup siu cute :^hihi</p>
  <div style="text-align:center;font-size:12px;color:#4b5563;margin-bottom:14px">
    <span class="cdot mid" id="cdot"></span><span id="ctext">Đang kết nối...</span>
  </div>
  <div id="app"></div>
</div>

<script>
const BACKEND_URL = 'https://noituvoiwuyenmup.baonam04012010.workers.dev/';
const ROOM = (location.hash.replace('#','').trim()||'main').replace(/[^a-z0-9_-]/gi,'').slice(0,20)||'main';

const START_WORDS = [
  'con mèo','con chó','hoa hồng','trái tim','bầu trời','dòng sông',
  'ngọn núi','cánh đồng','mặt trời','ánh sáng','tình yêu','gia đình',
  'quê hương','bạn bè','niềm vui','ước mơ','cuộc đời','con người',
  'học sinh','giáo viên','bông hoa','cây xanh','biển cả','đất nước',
  'con bướm','hoa lan','chim hót','cá vàng','gió thổi','mây trắng'
];

// Âm tiết cuối của cụm từ
function lastSyl(s){ return (s||'').trim().split(/\s+/).pop().toLowerCase(); }
// Âm tiết đầu của cụm từ
function firstSyl(s){ return (s||'').trim().split(/\s+/)[0].toLowerCase(); }

let myId='', myName='';
let state=mkState(), localStatus=null, localTimer=null, pollTimer=null;
const POLL=1300;

function mkState(){
  return {
    players:{}, askerOrder:[], version:0,
    phase:'lobby',   // 'lobby' | 'playing'
    ready:{},
    currentWord:'',  // từ đang cần nối (2 âm tiết)
    chain:[],        // toàn bộ chuỗi từ đã duyệt
    pendingWord:'',  // từ đang chờ duyệt
    pendingFrom:'',
    noterIndex:0,    // index người đang nối
    log:[], votes:{}
  };
}

function genId(){ return Math.random().toString(36).slice(2,9) }
function nowStr(){ return new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function isTyping(){ const el=document.activeElement; return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'); }

function setConn(ok,msg){
  document.getElementById('cdot').className='cdot '+(ok?'ok':ok===null?'mid':'bad');
  document.getElementById('ctext').textContent=msg||(ok?'Đã kết nối · Phòng: '+ROOM:'Mất kết nối...');
}

async function apiGet(){
  const r=await fetch(`${BACKEND_URL}?room=${ROOM}`,{signal:AbortSignal.timeout(6000)});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
async function apiPut(patch,_retries=0){
  if(_retries>4) throw new Error('Too many conflicts');
  const base=_retries>0?await apiGet():state;
  const payload={...base,...patch,version:base.version};
  const r=await fetch(`${BACKEND_URL}?room=${ROOM}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:AbortSignal.timeout(6000)});
  if(r.status===409){ state=await apiGet(); await new Promise(res=>setTimeout(res,100+Math.random()*200)); return apiPut(patch,_retries+1); }
  if(!r.ok) throw new Error(r.status);
  state=await r.json(); return state;
}

async function poll(){
  try{
    const ns=await apiGet(); setConn(true);
    const changed=ns.version!==state.version;
    state=ns; if(!myId) return; if(!changed) return;
    if(isTyping()) patchScores(); else render();
  } catch(e){ setConn(false); }
}
function patchScores(){
  for(const p of playerList()){
    const el=document.getElementById('score_'+p.id);
    if(el) el.textContent=(state.players[p.id]?.score)||0;
  }
}
function startPoll(){ if(pollTimer) clearInterval(pollTimer); poll(); pollTimer=setInterval(poll,POLL); }

function playerList(){
  const ord=state.askerOrder||[], ps=state.players||{}, res=[];
  for(const id of ord) if(ps[id]) res.push({id,...ps[id]});
  for(const id of Object.keys(ps)) if(!res.find(p=>p.id===id)) res.push({id,...ps[id]});
  return res;
}
function noter(){ const pl=playerList(); return pl.length?pl[(state.noterIndex||0)%pl.length]:null; }
function reviewer(){ const pl=playerList(); return pl.length<2?null:pl[((state.noterIndex||0)+1)%pl.length]; }

async function joinGame(name){
  myId=genId(); myName=name;
  state=await apiGet();
  const ps={...(state.players||{})}; ps[myId]={name,score:0};
  const ord=[...(state.askerOrder||[])]; if(!ord.includes(myId)) ord.push(myId);
  try{ await apiPut({players:ps,askerOrder:ord}); render(); startPoll(); }
  catch(e){ setLocalStatus('❌ Không kết nối được.','error'); }
}

async function leaveGame(){
  if(!myId) return;
  const ps={...(state.players||{})}; delete ps[myId];
  const ord=(state.askerOrder||[]).filter(id=>id!==myId);
  let ni=state.noterIndex||0; if(ni>=ord.length&&ord.length>0) ni=0;
  const ready={...(state.ready||{})}; delete ready[myId];
  try{ await apiPut({players:ps,askerOrder:ord,noterIndex:ni,ready,
    phase:ord.length<2?'lobby':state.phase,
    pendingWord:'',pendingFrom:''}) } catch{}
  myId=''; myName=''; clearInterval(pollTimer);
  document.getElementById('app').innerHTML=joinHtml();
}

async function toggleReady(){
  const fresh=await apiGet(); state=fresh;
  const ready={...(state.ready||{})};
  if(ready[myId]) delete ready[myId]; else ready[myId]=true;
  const pl=playerList();
  const allReady=pl.length>=2&&pl.every(p=>ready[p.id]);
  if(allReady){
    const startWord=START_WORDS[Math.floor(Math.random()*START_WORDS.length)];
    await doAction({ready,phase:'playing',chain:[startWord],currentWord:startWord,
      pendingWord:'',pendingFrom:'',noterIndex:0,log:[],votes:{}});
  } else {
    await doAction({ready});
  }
}

async function submitAnswer(word){
  const n=noter(); if(!n||n.id!==myId) return;
  const trimmed=word.trim().toLowerCase();
  const parts=trimmed.split(/\s+/);
  if(parts.length<2){ setLocalStatus('⚠ Cần nhập đúng 2 âm tiết, vd: "chim sẻ"','error'); return; }
  const needed=lastSyl(state.currentWord);
  const given=firstSyl(trimmed);
  if(given!==needed){ setLocalStatus(`⚠ Từ phải bắt đầu bằng "${needed}"!`,'error'); return; }
  if((state.chain||[]).includes(trimmed)){ setLocalStatus('⚠ Từ này đã dùng rồi!','error'); return; }
  await doAction({pendingWord:trimmed,pendingFrom:myId});
}

async function approveAnswer(ok){
  const rv=reviewer(); if(!rv||rv.id!==myId) return;
  const word=state.pendingWord; if(!word) return;
  const n=noter();
  const ps={...(state.players||{})};
  let log=[...(state.log||[])];
  if(ok){
    const chain=[...(state.chain||[]),word];
    if(n&&ps[n.id]) ps[n.id].score=(ps[n.id].score||0)+1;
    log.unshift({word,by:n?n.name:'?',ok:true,time:nowStr()});
    if(log.length>30) log=log.slice(0,30);
    const pl=playerList();
    const nextNoter=((state.noterIndex||0)+1)%pl.length;
    await doAction({chain,log,players:ps,currentWord:word,pendingWord:'',pendingFrom:'',noterIndex:nextNoter});
  } else {
    log.unshift({word,by:n?n.name:'?',ok:false,time:nowStr()});
    if(log.length>30) log=log.slice(0,30);
    await doAction({pendingWord:'',pendingFrom:'',log});
    setLocalStatus(`❌ Từ "${word}" không hợp lệ — ${n?n.name:'...'} nối lại!`,'error');
  }
}

async function surrender(){
  const n=noter(); if(!n||n.id!==myId) return;
  const rv=reviewer();
  const ps={...(state.players||{})};
  let log=[...(state.log||[])];
  log.unshift({word:'🏳 đầu hàng',by:n.name,ok:false,sur:true,time:nowStr()});
  if(log.length>30) log=log.slice(0,30);
  if(rv&&ps[rv.id]) ps[rv.id].score=(ps[rv.id].score||0)+1;
  const pl=playerList();
  const nextNoter=((state.noterIndex||0)+1)%pl.length;
  await doAction({pendingWord:'',pendingFrom:'',log,players:ps,noterIndex:nextNoter});
}

async function voteKick(targetId){
  if(!myId||targetId===myId) return;
  const votes={...(state.votes||{})};
  const key='kick_'+targetId;
  const ex=votes[key]||[];
  if(ex.includes(myId)) votes[key]=ex.filter(id=>id!==myId);
  else votes[key]=[...ex,myId];
  const needed=Math.ceil(playerList().length/2);
  if((votes[key]||[]).length>=needed){
    const ps={...(state.players||{})}; delete ps[targetId];
    const ord=(state.askerOrder||[]).filter(id=>id!==targetId);
    let ni=state.noterIndex||0; if(ni>=ord.length&&ord.length>0) ni=0;
    delete votes[key];
    await doAction({players:ps,askerOrder:ord,noterIndex:ni,
      phase:ord.length<2?'lobby':state.phase,
      pendingWord:'',pendingFrom:'',votes});
    setLocalStatus('✅ Đã kick!','success');
  } else { await doAction({votes}); }
}

async function voteReset(){
  if(!myId) return;
  const votes={...(state.votes||{})};
  const key='reset';
  const ex=votes[key]||[];
  if(ex.includes(myId)) votes[key]=ex.filter(id=>id!==myId);
  else votes[key]=[...ex,myId];
  const needed=Math.ceil(playerList().length/2);
  if((votes[key]||[]).length>=needed){
    const ps={};
    for(const id of Object.keys(state.players||{})) ps[id]={...state.players[id],score:0};
    await doAction({players:ps,chain:[],pendingWord:'',pendingFrom:'',currentWord:'',
      phase:'lobby',ready:{},noterIndex:0,log:[],votes:{}});
    setLocalStatus('✅ Đã reset phòng!','success');
  } else {
    await doAction({votes});
    setLocalStatus(`🗳 Vote reset (${(votes[key]||[]).length}/${needed})`,'info');
  }
}

async function doAction(patch){
  try{ await apiPut(patch); render(); }
  catch(e){ setLocalStatus('❌ Lỗi kết nối','error'); }
}

function setLocalStatus(msg,type){
  localStatus={msg,type}; clearTimeout(localTimer);
  localTimer=setTimeout(()=>{localStatus=null;renderStatusOnly();},4000);
  renderStatusOnly();
}
function renderStatusOnly(){
  const el=document.getElementById('localStatusBar');
  if(el) el.innerHTML=localStatus?`<div class="status-bar ${localStatus.type}" style="margin-top:10px">${localStatus.msg}</div>`:'';
}

function render(){
  if(!myId){ document.getElementById('app').innerHTML=joinHtml(); return; }
  const pl=playerList(), n=noter(), rv=reviewer();
  const isNoter=n&&n.id===myId, isReviewer=rv&&rv.id===myId;
  const wait=pl.length<2, phase=state.phase||'lobby';
  let h='';

  // Card người chơi
  h+=`<div class="card"><div class="section-label">Người chơi (${pl.length})</div><div class="players-row">`;
  for(const p of pl){
    const me=p.id===myId, isReady=(state.ready||{})[p.id];
    h+=`<div class="player-badge">
      <div class="player-dot ${me?'dot-me':''}"></div>
      <span>${esc(p.name)}${me?' (bạn)':''}</span>
      ${phase==='lobby'?`<span class="${isReady?'ready-badge':'waiting-badge'}">${isReady?'✓ Sẵn sàng':'Chờ...'}</span>`:''}
    </div>`;
  }
  if(wait) h+=`<span style="font-size:12px;color:#4b5563;font-style:italic">Chờ bạn bè vào...</span>`;
  h+=`</div>`;

  // Vote buttons (khi đang chơi)
  if(phase==='playing'&&!wait){
    const votes=state.votes||{}, needed=Math.ceil(pl.length/2);
    h+=`<div class="vote-row">`;
    for(const p of pl){
      if(p.id===myId) continue;
      const key='kick_'+p.id, cnt=(votes[key]||[]).length, iV=(votes[key]||[]).includes(myId);
      h+=`<button class="vote-btn ${iV?'voted':''}" onclick="voteKick('${p.id}')">🚫 Kick ${esc(p.name)}${cnt>0?` (${cnt}/${needed})`:''}</button>`;
    }
    const rk='reset', rc=(votes[rk]||[]).length, iVR=(votes[rk]||[]).includes(myId);
    h+=`<button class="vote-btn ${iVR?'reset-voted':''}" onclick="voteReset()">🔄 Vote reset${rc>0?` (${rc}/${needed})`:''}</button>`;
    h+=`</div>`;
  }

  if(wait) h+=`<div style="margin-top:12px;background:#12141f;border:1px dashed #2a2d3e;border-radius:10px;padding:10px 14px;font-size:12px;color:#6b7280">📎 Gửi link này cho bạn: <b style="color:#a78bfa;word-break:break-all">${esc(location.href)}</b></div>`;
  h+=`</div>`;

  // LOBBY
  if(phase==='lobby'){
    h+=`<div class="card">`;
    if(wait){
      h+=`<div class="status-bar info">⏳ Cần ít nhất 2 người để bắt đầu</div>`;
    } else {
      const isReady=(state.ready||{})[myId];
      h+=`<button class="${isReady?'btn-unready':'btn-ready'}" onclick="toggleReady()">${isReady?'↩ Bỏ sẵn sàng':'✋ Sẵn sàng!'}</button>`;
      if(!pl.every(p=>(state.ready||{})[p.id]))
        h+=`<div style="font-size:12px;color:#4b5563;margin-top:10px;text-align:center">Chờ tất cả bấm sẵn sàng...</div>`;
    }
    h+=`</div>`;
    h+=`<div class="card" style="background:#12141f">
      <div class="section-label">Cách chơi</div>
      <div class="rules-box">
        Game cho 1 từ 2 âm tiết. Người nối ghép từ mới: âm tiết đầu = âm tiết cuối từ trước.<br>
        <span class="eg">Ví dụ: <span class="chip">con cá</span> → <span class="chip">cá chim</span> → <span class="chip">chim sẻ</span> → ...</span><br>
        Người kia duyệt. Hợp lệ thì đổi lượt nối. Không hợp lệ thì nối lại.<br>
        Bí quá thì bấm <b>Đầu hàng</b> — đối thủ được 1 điểm.
      </div>
    </div>`;
  }

  // PLAYING
  if(phase==='playing'){
    const chain=state.chain||[], cw=state.currentWord||'', ls=lastSyl(cw);

    // Chuỗi từ
    h+=`<div class="card"><div class="section-label">Chuỗi từ (${chain.length})</div><div class="chain-display">`;
    if(!chain.length){ h+=`<span style="color:#374151;font-size:13px;font-style:italic">Chưa có từ nào...</span>`; }
    else {
      const st=Math.max(0,chain.length-8);
      if(st>0) h+=`<span style="color:#374151;font-size:11px">...${st} từ trước</span><span class="chain-arrow">→</span>`;
      for(let i=st;i<chain.length;i++){
        if(i>st) h+=`<span class="chain-arrow">→</span>`;
        h+=`<span class="chain-word ${i===0?'start':i===chain.length-1?'latest':''}">${esc(chain[i])}</span>`;
      }
    }
    h+=`</div></div>`;

    // Action card
    h+=`<div class="card" id="actionCard">`;
    if(!state.pendingWord){
      // Hiện từ cần nối
      h+=`<div class="current-prompt">
        <div class="prompt-label">Từ hiện tại</div>
        <div class="prompt-word">${esc(cw.toUpperCase())}</div>
        <div class="prompt-connect">Âm tiết cần nối: <span class="chip">${esc(ls)}</span></div>
        <div class="prompt-hint">Nhập từ 2 âm tiết bắt đầu bằng "<b>${esc(ls)}</b> ..."</div>
      </div>`;
      if(isNoter){
        h+=`<div class="input-row">
          <input type="text" id="ansInput" placeholder="${esc(ls)} ..." autocomplete="off"/>
          <button onclick="handleAns()">Nối →</button>
        </div>`;
        h+=`<div style="margin-top:10px"><button class="btn-surrender" onclick="surrender()">🏳 Đầu hàng</button></div>`;
      } else {
        h+=`<div class="status-bar info">⏳ Chờ <b>${n?esc(n.name):'...'}</b> nối từ...</div>`;
      }
    } else {
      // Có từ đang chờ duyệt
      if(isReviewer){
        h+=`<div class="approval-box">
          <div style="font-size:12px;color:#92400e;margin-bottom:6px">Từ nối từ <b>${n?esc(n.name):'...'}</b></div>
          <div class="approval-word">${esc(cw.toUpperCase())} → ${esc(state.pendingWord.toUpperCase())}</div>
          <div class="approval-sub">Từ "<b>${esc(state.pendingWord)}</b>" có hợp lệ không?</div>
          <div class="approval-actions">
            <button class="btn-approve" onclick="approveAnswer(true)">✓ Hợp lệ</button>
            <button class="btn-reject" onclick="approveAnswer(false)">✗ Không hợp lệ</button>
          </div>
        </div>`;
      } else {
        h+=`<div class="current-prompt">
          <div class="prompt-label">Từ bạn đã nối</div>
          <div class="prompt-word">${esc(state.pendingWord.toUpperCase())}</div>
        </div>`;
        h+=`<div class="status-bar pending"><div class="spinner"></div><span>Chờ <b>${rv?esc(rv.name):'...'}</b> duyệt...</span></div>`;
      }
    }
    h+=`<div id="localStatusBar">${localStatus?`<div class="status-bar ${localStatus.type}" style="margin-top:10px">${localStatus.msg}</div>`:''}</div>`;
    h+=`</div>`;

    // Điểm
    h+=`<div class="card"><div class="section-label">Điểm số</div><div class="score-row">`;
    for(const p of pl) h+=`<div class="score-card"><div class="score-num" id="score_${p.id}">${(state.players[p.id]?.score)||0}</div><div class="score-lbl">${esc(p.name)}</div></div>`;
    h+=`</div></div>`;

    // Log
    const log=state.log||[];
    if(log.length){
      h+=`<div class="card"><div class="section-label">Lịch sử</div><div class="log-list">`;
      for(const l of log) h+=`<div class="log-item">
        <span class="log-who">${esc(l.by)}</span>
        <span class="log-word">${esc(l.word)}</span>
        <span class="log-badge ${l.sur?'badge-sur':l.ok?'badge-ok':'badge-no'}">${l.sur?'🏳':l.ok?'✓':'✗'}</span>
        <span style="color:#374151;font-size:11px">${l.time}</span>
      </div>`;
      h+=`</div></div>`;
    }
  }

  h+=`<div style="text-align:center;margin-top:16px"><button class="btn-secondary" onclick="leaveGame()">🚪 Rời game</button></div>`;
  document.getElementById('app').innerHTML=h;
}

function joinHtml(){
  return `<div class="card">
    <div class="section-label">Nhập tên của bạn</div>
    <div class="join-form">
      <input type="text" id="nameInput" placeholder="Tên hiển thị..." maxlength="20" autocomplete="off"/>
      <button onclick="handleJoin()">Vào chơi →</button>
    </div>
    <div style="text-align:center;font-size:13px;color:#4b5563;margin-top:14px">:^</div>
  </div>`;
}

function handleJoin(){ const n=document.getElementById('nameInput')?.value.trim(); if(n) joinGame(n); }
function handleAns(){ const w=document.getElementById('ansInput')?.value.trim().toLowerCase(); if(w) submitAnswer(w); }

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const n=document.getElementById('nameInput'), a=document.getElementById('ansInput');
  if(document.activeElement===n) handleJoin();
  else if(document.activeElement===a) handleAns();
});

document.getElementById('app').innerHTML=joinHtml();
startPoll();
</script>
</body>
</html>
